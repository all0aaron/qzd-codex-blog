<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>站点设置 - 墨丘博客系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; display: flex; background: #f4f6f8; color: #172033; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    a { color: inherit; text-decoration: none; }
    aside { width: 248px; min-width: 248px; background: #18212f; color: #aeb8c8; min-height: 100vh; }
    .brand { padding: 22px 20px; border-bottom: 1px solid #263244; color: #fff; font-weight: 800; }
    .nav-title { padding: 18px 20px 7px; font-size: 11px; color: #65758c; font-weight: 800; letter-spacing: 1px; }
    .nav a { display: block; padding: 11px 20px; border-left: 3px solid transparent; font-size: 14px; }
    .nav a.active, .nav a:hover { color: #fff; background: #243145; border-left-color: #38bdf8; }
    main { flex: 1; padding: 26px 30px 44px; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 18px; }
    h1 { font-size: 25px; }
    .sub { color: #667085; font-size: 13.5px; margin-top: 5px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; min-height: 38px; padding: 0 14px; border-radius: 8px; border: 1px solid #d8e1ec; background: #fff; color: #334155; font-weight: 700; font-size: 13px; }
    .primary { background: #0f766e; color: #fff; border-color: #0f766e; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) 330px; gap: 16px; }
    .card { background: #fff; border: 1px solid #e4eaf1; border-radius: 8px; padding: 18px; margin-bottom: 16px; }
    h2 { font-size: 17px; margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: #344054; font-weight: 800; margin: 14px 0 7px; }
    input, textarea, select { width: 100%; border: 1px solid #d8e1ec; border-radius: 8px; padding: 11px 12px; font: inherit; outline: 0; background: #fff; }
    textarea { resize: vertical; min-height: 92px; line-height: 1.7; }
    .preview { background: #172033; color: #fff; border-radius: 8px; overflow: hidden; }
    .preview-img { height: 150px; background: url("https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=700&q=80") center/cover; }
    .preview-body { padding: 16px; }
    .preview-body p { color: #cbd5e1; font-size: 13.5px; line-height: 1.7; margin-top: 8px; }
    .switch { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid #eef2f6; color: #526174; font-size: 13.5px; }
    .switch input { width: auto; }
    .pager { margin-top: 18px; display: flex; justify-content: space-between; gap: 12px; }
    .pager a { padding: 10px 14px; border: 1px solid #d8e1ec; border-radius: 8px; background: #fff; color: #334155; font-size: 13px; }
    @media (max-width: 980px) { aside { display: none; } .layout { grid-template-columns: 1fr; } main { padding: 20px; } }
  </style>
</head>
<body>
  <aside>
    <div class="brand">墨丘后台</div>
    <div class="nav">
      <div class="nav-title">工作台</div>
      <a href="ui_admin_dashboard.html">仪表盘</a>
      <a href="ui_admin_posts.html">文章管理</a>
      <a href="ui_admin_comments.html">评论管理</a>
      <a class="active" href="ui_admin_settings.html">站点设置</a>
      <div class="nav-title">预览</div>
      <a href="ui_home.html">前台首页</a>
      <a href="index.html">返回总控台</a>
    </div>
  </aside>
  <main>
    <div class="top">
      <div><h1>站点设置</h1><p class="sub">维护站点基础信息、作者资料、SEO 和评论策略。</p></div>
      <div><a class="btn" href="index.html">返回总控台</a> <a class="btn primary">保存设置</a></div>
    </div>
    <section class="layout">
      <div>
        <div class="card">
          <h2>基础信息</h2>
          <label>站点名称</label><input value="墨丘">
          <label>站点副标题</label><input value="记录产品、代码与长期思考">
          <label>站点简介</label><textarea>墨丘博客聚合技术实践、产品复盘和个人知识库内容，帮助读者从真实项目中获得可复用的经验。</textarea>
          <label>备案号</label><input value="沪ICP备2026061501号">
        </div>
        <div class="card">
          <h2>作者资料</h2>
          <label>作者名称</label><input value="秦知远">
          <label>作者简介</label><textarea>产品工程师，关注内容系统、自动化工具和长期写作。</textarea>
          <label>联系邮箱</label><input value="hello@moqiu.blog">
        </div>
        <div class="card">
          <h2>SEO 设置</h2>
          <label>首页标题</label><input value="墨丘 - 产品、代码与长期思考">
          <label>关键词</label><input value="博客, 产品复盘, 工程实践, 内容系统">
          <label>描述</label><textarea>一个面向创作者的个人博客，持续记录产品设计、工程实践和内容运营。</textarea>
        </div>
      </div>
      <aside style="min-width:0;">
        <div class="card">
          <h2>前台预览</h2>
          <div class="preview"><div class="preview-img"></div><div class="preview-body"><h3>墨丘</h3><p>记录产品、代码与长期思考。聚合技术实践、产品复盘和个人知识库内容。</p></div></div>
        </div>
        <div class="card">
          <h2>评论策略</h2>
          <div class="switch"><span>新评论需要审核</span><input type="checkbox" checked></div>
          <div class="switch"><span>允许游客评论</span><input type="checkbox" checked></div>
          <div class="switch"><span>评论展示邮箱头像</span><input type="checkbox"></div>
          <div class="switch"><span>隐藏敏感词评论</span><input type="checkbox" checked></div>
        </div>
      </aside>
    </section>
    <div class="pager"><a href="ui_admin_comments.html">上一页：评论管理</a><a href="index.html">下一页：总控台</a></div>
  </main>
</body>
</html>
